name: Forza Scan

on:
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scan
        env:
          FORZA_EMAIL: ${{ secrets.FORZA_EMAIL }}
          FORZA_PASSWORD: ${{ secrets.FORZA_PASSWORD }}
        run: node scan.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            result.png
            error.png
          if-no-files-found: ignore
